services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Database
      - AI_CORRECTION_DATABASE_URL=sqlite:///data/app.db

      # Data directory
      - AI_CORRECTION_DATA_DIR=/app/data
    volumes:
      # SQLite database and session storage
      - ./data:/app/data:z

      # Application logs
      - ./logs:/app/logs:z
    restart: unless-stopped
    networks:
      - app-network
    # No depends_on for database - using SQLite file-based storage

networks:
  app-network:
    driver: bridge
